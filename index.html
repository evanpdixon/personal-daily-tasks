<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evan's Daily Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            padding: 48px 20px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 24px 0 16px;
            border-bottom: 1px solid #21262d;
            margin-bottom: 24px;
        }
        header h1 {
            color: #e5a00d;
            font-size: 1.6rem;
            font-weight: 700;
        }
        header .date {
            color: #8b949e;
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .header-links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .progress-bar {
            background: #161b22;
            border-radius: 8px;
            height: 8px;
            margin: 16px 0 24px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #e5a00d, #f0c040);
            height: 100%;
            border-radius: 8px;
            transition: width 0.4s ease;
        }
        .progress-label {
            text-align: center;
            font-size: 0.85rem;
            color: #8b949e;
            margin-bottom: 8px;
        }

        /* Priority Sections */
        .priority-section {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .priority-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 18px;
            cursor: pointer;
            user-select: none;
        }
        .priority-header h2 { flex: 1; }
        .priority-header:hover { background: #1c2129; }
        .priority-header h2 {
            color: #e5a00d;
            font-size: 1.05rem;
            font-weight: 600;
        }
        .priority-header .badge {
            background: #21262d;
            color: #8b949e;
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 12px;
        }
        .priority-header .badge.done {
            background: #1b4332;
            color: #52c41a;
        }
        .priority-body { padding: 0 18px 16px; }

        /* Task Items */
        .task {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #21262d;
        }
        .task:last-child { border-bottom: none; }
        .task input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            min-width: 20px;
            border: 2px solid #30363d;
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            margin-top: 2px;
            position: relative;
        }
        .task input[type="checkbox"]:checked {
            background: #e5a00d;
            border-color: #e5a00d;
        }
        .task input[type="checkbox"]:checked::after {
            content: '\2713';
            position: absolute;
            color: #0d1117;
            font-size: 14px;
            font-weight: bold;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .task.checked .task-text { text-decoration: line-through; color: #484f58; }
        .task-text { flex: 1; font-size: 0.95rem; line-height: 1.5; }
        .task-text .sub { color: #8b949e; font-size: 0.85rem; display: block; }

        /* Inline editing */
        .task-label { cursor: pointer; border-radius: 4px; padding: 1px 4px; margin: -1px -4px; }
        .task-label:hover { background: #21262d; }
        .task-label.sub-label { color: #8b949e; font-size: 0.85rem; display: block; margin-top: 2px; }
        .task-edit-input {
            background: #0d1117;
            border: 1px solid #e5a00d;
            color: #c9d1d9;
            font-family: inherit;
            font-size: inherit;
            padding: 2px 6px;
            border-radius: 4px;
            width: 100%;
            outline: none;
        }

        /* Section management */
        .section-header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-action-btn {
            background: none;
            border: none;
            color: #484f58;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .section-action-btn:hover { color: #e5a00d; }
        .priority-header h2.editable-title { cursor: pointer; border-radius: 4px; padding: 2px 6px; margin: -2px -6px; }
        .priority-header h2.editable-title:hover { background: #21262d; }
        .section-title-input {
            background: #0d1117;
            border: 1px solid #e5a00d;
            color: #e5a00d;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            outline: none;
            width: auto;
        }
        .add-section-btn {
            display: block;
            width: 100%;
            background: none;
            border: 1px dashed #30363d;
            color: #8b949e;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .add-section-btn:hover { border-color: #e5a00d; color: #e5a00d; }

        /* Drag and drop */
        .drag-handle {
            cursor: grab;
            color: #484f58;
            padding: 0 4px;
            font-size: 1rem;
            user-select: none;
            touch-action: none;
            flex-shrink: 0;
        }
        .drag-handle:hover { color: #8b949e; }
        .drag-handle:active { cursor: grabbing; }
        .dragging { opacity: 0.3; }
        .drag-placeholder {
            height: 3px;
            background: #e5a00d;
            border-radius: 2px;
            margin: 2px 0;
        }

        /* Grocery Section */
        .grocery-list { list-style: none; padding: 0; }
        .grocery-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            border-bottom: 1px solid #21262d;
        }
        .grocery-list li:last-child { border-bottom: none; }
        .grocery-list li input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px; height: 18px; min-width: 18px;
            border: 2px solid #30363d;
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            position: relative;
        }
        .grocery-list li input[type="checkbox"]:checked {
            background: #52c41a;
            border-color: #52c41a;
        }
        .grocery-list li input[type="checkbox"]:checked::after {
            content: '\2713';
            position: absolute;
            color: #0d1117;
            font-size: 12px;
            font-weight: bold;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .grocery-list li.checked span { text-decoration: line-through; color: #484f58; }
        .add-item {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .add-item input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .add-item input:focus { outline: none; border-color: #e5a00d; }
        .add-item button {
            background: #e5a00d;
            color: #0d1117;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .add-item button:hover { background: #f0c040; }

        /* Custom Lists */
        .add-list-btn {
            display: block;
            width: 100%;
            background: none;
            border: 1px dashed #30363d;
            color: #8b949e;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .add-list-btn:hover { border-color: #52c41a; color: #52c41a; }

        /* Notes */
        .notes-area {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            min-height: 80px;
            resize: vertical;
        }
        .notes-area:focus { outline: none; border-color: #e5a00d; }

        /* Time indicator */
        .time-now {
            text-align: center;
            color: #8b949e;
            font-size: 0.8rem;
            padding: 12px 0;
        }
        .nav-link {
            display: inline-block;
            color: #e5a00d;
            text-decoration: none;
            font-size: 0.85rem;
            border: 1px solid #30363d;
            padding: 6px 14px;
            border-radius: 6px;
        }
        .nav-link:hover { background: #161b22; }
        .settings-link {
            color: #8b949e;
            text-decoration: none;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .settings-link:hover { color: #e5a00d; }

        /* Save indicator */
        .save-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1b4332;
            color: #52c41a;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1000;
        }
        .save-indicator.show { opacity: 1; }
        .save-indicator.error { background: #4a1c1c; color: #f85149; }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0d1117ee;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            color: #e5a00d;
            font-size: 1.1rem;
        }

        /* PAT Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0d1117ee;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 28px;
            max-width: 480px;
            width: 90%;
        }
        .modal h2 { color: #e5a00d; margin-bottom: 12px; font-size: 1.2rem; }
        .modal p { color: #8b949e; font-size: 0.9rem; margin-bottom: 16px; line-height: 1.5; }
        .modal input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: monospace;
            margin-bottom: 16px;
        }
        .modal input:focus { outline: none; border-color: #e5a00d; }
        .modal button {
            background: #e5a00d;
            color: #0d1117;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .modal button:hover { background: #f0c040; }
        .modal a { color: #e5a00d; font-size: 0.85rem; }

        /* Sticky top bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 36px;
            background: #0d1117;
            border-bottom: 1px solid #21262d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 900;
            font-size: 0.78rem;
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .top-bar-brand {
            color: #e5a00d;
            font-weight: 700;
            font-size: 0.8rem;
            text-decoration: none;
        }
        .top-bar-nav {
            display: flex;
            gap: 4px;
        }
        .top-bar-nav a {
            color: #8b949e;
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.78rem;
        }
        .top-bar-nav a:hover { background: #161b22; color: #c9d1d9; }
        .top-bar-nav a.active { background: #161b22; color: #e5a00d; }
        .top-bar-right {
            color: #8b949e;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .top-bar-right .settings-link { font-size: 0.78rem; }

        /* Responsive */
        @media (max-width: 600px) {
            body { padding: 12px; }
            header h1 { font-size: 1.3rem; }
            .priority-header h2 { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-left">
            <span class="top-bar-brand">Daily Dashboard</span>
            <nav class="top-bar-nav">
                <a href="index.html" class="active">Today</a>
                <a href="backlog.html" id="backlog-link">Backlog</a>
            </nav>
        </div>
        <div class="top-bar-right">
            <span id="top-bar-date"></span>
            <span id="top-bar-clock"></span>
            <a class="settings-link" onclick="showPatModal()">&#9881;</a>
        </div>
    </div>

    <div class="loading-overlay" id="loading">Loading dashboard...</div>
    <div class="save-indicator" id="save-indicator">Saved</div>

    <div class="container" id="app" style="display:none;">
        <header>
            <h1>Daily Dashboard</h1>
            <div class="date" id="header-date"></div>
        </header>

        <div class="progress-label"><span id="done-count">0</span> of <span id="total-count">0</span> tasks complete</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

        <div id="sections-container"></div>
        <button class="add-section-btn" onclick="addSection()">+ Add Section</button>

        <!-- Custom Lists -->
        <div id="lists-container"></div>

        <!-- Grocery Section -->
        <div class="priority-section" id="grocery-section">
            <div class="priority-header" onclick="toggleSection(this)">
                <h2>Grocery Store Trip</h2>
                <span class="badge" id="grocery-badge">0 items</span>
            </div>
            <div class="priority-body">
                <ul class="grocery-list" id="grocery-list"></ul>
                <div class="add-item">
                    <input type="text" id="grocery-input" placeholder="Add item..." onkeydown="if(event.key==='Enter')addGroceryItem()">
                    <button onclick="addGroceryItem()">Add</button>
                </div>
            </div>
        </div>

        <button class="add-list-btn" onclick="addList()">+ Add List</button>

        <!-- Notes Section -->
        <div class="priority-section">
            <div class="priority-header" onclick="toggleSection(this)">
                <h2>Notes</h2>
                <span class="badge">memo</span>
            </div>
            <div class="priority-body">
                <textarea class="notes-area" placeholder="Notes -- jot anything down here..." id="admin-notes" oninput="scheduleSave()"></textarea>
            </div>
        </div>
    </div>

<script>
// ════════════════════════════════════════════
// GitHub API Configuration
// ════════════════════════════════════════════
const REPO = 'evanpdixon/personal-daily-tasks';
const FILE_PATH = 'data.json';
const API_BASE = 'https://api.github.com';

let currentData = null;
let currentSha = null;
let saveTimeout = null;
let saving = false;

// ════════════════════════════════════════════
// PAT Management
// ════════════════════════════════════════════
function getPat() {
    return localStorage.getItem('gh-pat');
}

function showPatModal() {
    let existing = document.getElementById('pat-modal');
    if (existing) existing.remove();
    const modal = document.createElement('div');
    modal.id = 'pat-modal';
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal">
            <h2>GitHub Personal Access Token</h2>
            <p>Enter a fine-grained PAT with <strong>Contents: Read & Write</strong> scope for the <code>evanpdixon/personal-daily-tasks</code> repo.</p>
            <p><a href="https://github.com/settings/personal-access-tokens/new" target="_blank">Create a new token on GitHub</a></p>
            <input type="password" id="pat-input" placeholder="github_pat_..." value="${getPat() || ''}">
            <button onclick="savePat()">Save & Load</button>
        </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('pat-input').focus();
}

function savePat() {
    const pat = document.getElementById('pat-input').value.trim();
    if (!pat) return;
    localStorage.setItem('gh-pat', pat);
    document.getElementById('pat-modal').remove();
    init();
}

// ════════════════════════════════════════════
// GitHub API
// ════════════════════════════════════════════
async function fetchData() {
    const pat = getPat();
    const res = await fetch(`${API_BASE}/repos/${REPO}/contents/${FILE_PATH}`, {
        headers: {
            'Authorization': `Bearer ${pat}`,
            'Accept': 'application/vnd.github.v3+json'
        }
    });
    if (!res.ok) {
        if (res.status === 401 || res.status === 403) {
            showPatModal();
            throw new Error('Invalid token');
        }
        throw new Error(`GitHub API error: ${res.status}`);
    }
    const json = await res.json();
    currentSha = json.sha;
    const content = atob(json.content.replace(/\n/g, ''));
    // Decode as UTF-8
    const bytes = new Uint8Array(content.length);
    for (let i = 0; i < content.length; i++) bytes[i] = content.charCodeAt(i);
    const decoded = new TextDecoder().decode(bytes);
    currentData = JSON.parse(decoded);
    return currentData;
}

async function saveData() {
    if (saving) return;
    saving = true;
    const pat = getPat();
    const content = JSON.stringify(currentData, null, 2);
    // Encode as base64 (UTF-8 safe)
    const encoded = btoa(unescape(encodeURIComponent(content)));

    try {
        const res = await fetch(`${API_BASE}/repos/${REPO}/contents/${FILE_PATH}`, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${pat}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: `Dashboard update ${new Date().toISOString()}`,
                content: encoded,
                sha: currentSha
            })
        });

        if (res.status === 409) {
            // SHA conflict -- re-fetch SHA but keep local data
            const localData = JSON.parse(JSON.stringify(currentData));
            await fetchData();
            currentData = localData;
            saving = false;
            await saveData();
            return;
        }

        if (!res.ok) {
            throw new Error(`Save failed: ${res.status}`);
        }

        const result = await res.json();
        currentSha = result.content.sha;
        showSaveIndicator('Saved', false);
    } catch (e) {
        console.error('Save error:', e);
        showSaveIndicator('Save failed', true);
    } finally {
        saving = false;
    }
}

function scheduleSave() {
    if (saveTimeout) clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
        updateDataFromUI();
        saveData();
    }, 500);
}

function showSaveIndicator(text, isError) {
    const el = document.getElementById('save-indicator');
    el.textContent = text;
    el.classList.toggle('error', isError);
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1500);
}

// ════════════════════════════════════════════
// Rendering
// ════════════════════════════════════════════
function renderDashboard() {
    const data = currentData;

    // Date
    const d = new Date(data.date + 'T12:00:00');
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('header-date').textContent = d.toLocaleDateString('en-US', opts);

    // Backlog link
    const backlogCount = data.backlog ? data.backlog.length : 0;
    document.getElementById('backlog-link').textContent = `Backlog (${backlogCount})`;

    // Sections
    const container = document.getElementById('sections-container');
    container.innerHTML = '';
    data.sections.forEach((section, si) => {
        const div = document.createElement('div');
        div.className = 'priority-section';
        div.dataset.sectionIdx = si;
        div.draggable = true;

        let tasksHtml = '';
        section.tasks.forEach((task, ti) => {
            const checked = task.done ? 'checked' : '';
            const checkedClass = task.done ? 'checked' : '';
            const subHtml = task.sub
                ? `<span class="task-label sub-label" onclick="event.stopPropagation();startEditTask(${si},${ti},'sub',this)">${escapeHtml(task.sub)}</span>`
                : `<span class="task-label sub-label" onclick="event.stopPropagation();startEditTask(${si},${ti},'sub',this)" style="color:#484f58;font-style:italic;">+ add detail</span>`;
            tasksHtml += `
                <div class="task ${checkedClass}" draggable="true" data-section="${si}" data-task="${ti}">
                    <span class="drag-handle" title="Drag to reorder">&#9776;</span>
                    <input type="checkbox" ${checked} onchange="handleCheck(${si}, ${ti}, this)">
                    <div class="task-text">
                        <span class="task-label" onclick="event.stopPropagation();startEditTask(${si},${ti},'text',this)">${escapeHtml(task.text)}</span>
                        ${subHtml}
                    </div>
                    <button onclick="deleteTask(${si}, ${ti})" title="Delete task" style="background:none;border:none;color:#484f58;cursor:pointer;font-size:1.1rem;padding:0 4px;">&#128465;</button>
                    <button onclick="moveToBacklog(${si}, ${ti})" title="Move to backlog" style="background:none;border:1px solid #30363d;color:#8b949e;cursor:pointer;font-size:0.7rem;padding:3px 8px;border-radius:4px;white-space:nowrap;">&#8592; Backlog</button>
                </div>`;
        });

        const doneCount = section.tasks.filter(t => t.done).length;
        const totalCount = section.tasks.length;
        const badgeClass = doneCount === totalCount && totalCount > 0 ? 'badge done' : 'badge';

        div.innerHTML = `
            <div class="priority-header" onclick="toggleSection(this)">
                <span class="drag-handle section-drag-handle" title="Drag to reorder section" onclick="event.stopPropagation()">&#9776;</span>
                <h2 class="editable-title" onclick="event.stopPropagation();startEditSection(${si},this)">${escapeHtml(section.title)}</h2>
                <div class="section-header-right">
                    <span class="${badgeClass}">${doneCount}/${totalCount}</span>
                    <button class="section-action-btn" onclick="event.stopPropagation();deleteSection(${si})" title="Delete section">&#128465;</button>
                </div>
            </div>
            <div class="priority-body">
                ${tasksHtml}
                <div class="add-item" style="margin-top:8px;">
                    <input type="text" placeholder="Add task..." onkeydown="if(event.key==='Enter')addTaskToSection(${si},this)">
                    <button onclick="addTaskToSection(${si},this.previousElementSibling)">Add</button>
                </div>
            </div>`;
        container.appendChild(div);
    });

    // Custom Lists
    renderLists();

    // Grocery
    renderGrocery();

    // Notes
    document.getElementById('admin-notes').value = data.notes || '';

    updateProgress();
    initDragDrop();
}

function renderGrocery() {
    const list = document.getElementById('grocery-list');
    list.innerHTML = '';
    currentData.grocery.forEach((item, i) => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('checked');
        li.innerHTML = `<input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleGrocery(${i}, this)"><span>${escapeHtml(item.text)}</span><button style="margin-left:auto;background:none;border:none;color:#484f58;cursor:pointer;font-size:1.1rem;" onclick="removeGrocery(${i})" title="Remove">&times;</button>`;
        list.appendChild(li);
    });
    updateGroceryBadge();
}

// ════════════════════════════════════════════
// Interactions
// ════════════════════════════════════════════
function handleCheck(sectionIdx, taskIdx, el) {
    currentData.sections[sectionIdx].tasks[taskIdx].done = el.checked;
    renderDashboard();
    scheduleSave();
}

function toggleGrocery(idx, el) {
    currentData.grocery[idx].done = el.checked;
    const li = el.closest('li');
    if (el.checked) li.classList.add('checked');
    else li.classList.remove('checked');
    scheduleSave();
}

function removeGrocery(idx) {
    currentData.grocery.splice(idx, 1);
    renderGrocery();
    scheduleSave();
}

function addGroceryItem() {
    const input = document.getElementById('grocery-input');
    const text = input.value.trim();
    if (!text) return;
    currentData.grocery.push({ text: text, done: false });
    input.value = '';
    renderGrocery();
    scheduleSave();
}

function deleteTask(sectionIdx, taskIdx) {
    const section = currentData.sections[sectionIdx];
    const task = section.tasks[taskIdx];
    if (!task) return;
    if (!confirm(`Delete "${task.text}"?`)) return;

    section.tasks.splice(taskIdx, 1);
    if (section.tasks.length === 0) {
        currentData.sections.splice(sectionIdx, 1);
    }

    renderDashboard();
    scheduleSave();
    showSaveIndicator('Deleted', false);
}

function moveToBacklog(sectionIdx, taskIdx) {
    const section = currentData.sections[sectionIdx];
    const task = section.tasks[taskIdx];
    if (!task) return;

    // Add to backlog
    if (!currentData.backlog) currentData.backlog = [];
    currentData.backlog.unshift({
        id: 'bt-' + Date.now(),
        title: task.text,
        detail: task.sub || '',
        priority: 'medium',
        category: section.title,
        source: 'daily'
    });

    // Remove from daily
    section.tasks.splice(taskIdx, 1);

    // Remove empty sections
    if (section.tasks.length === 0) {
        currentData.sections.splice(sectionIdx, 1);
    }

    renderDashboard();
    scheduleSave();
    showSaveIndicator('Moved to backlog', false);
}

function toggleSection(header) {
    const body = header.nextElementSibling;
    body.style.display = body.style.display === 'none' ? 'block' : 'none';
}

// ════════════════════════════════════════════
// Inline Editing
// ════════════════════════════════════════════
function startEditTask(sectionIdx, taskIdx, field, el) {
    if (el.querySelector('.task-edit-input')) return;
    const task = currentData.sections[sectionIdx].tasks[taskIdx];
    const currentVal = task[field] || '';

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'task-edit-input';
    input.value = currentVal;
    input.placeholder = field === 'sub' ? 'Add detail...' : 'Task text...';
    el.textContent = '';
    el.appendChild(input);
    input.focus();
    input.select();

    function finishEdit() {
        const newVal = input.value.trim();
        if (field === 'text' && !newVal) {
            task[field] = currentVal;
        } else {
            task[field] = newVal;
        }
        renderDashboard();
        scheduleSave();
    }
    input.addEventListener('blur', finishEdit);
    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { input.value = currentVal; input.blur(); }
    });
    input.addEventListener('click', e => e.stopPropagation());
}

function startEditSection(sectionIdx, h2El) {
    if (h2El.querySelector('.section-title-input')) return;
    const section = currentData.sections[sectionIdx];
    const currentTitle = section.title;

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'section-title-input';
    input.value = currentTitle;
    h2El.textContent = '';
    h2El.appendChild(input);
    input.focus();
    input.select();

    function finishEdit() {
        const newTitle = input.value.trim();
        if (newTitle && newTitle !== currentTitle) {
            section.title = newTitle;
            scheduleSave();
        }
        renderDashboard();
    }
    input.addEventListener('blur', finishEdit);
    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { input.value = currentTitle; input.blur(); }
    });
    input.addEventListener('click', e => e.stopPropagation());
}

// ════════════════════════════════════════════
// Adding Tasks & Sections
// ════════════════════════════════════════════
function addTaskToSection(sectionIdx, inputEl) {
    const text = inputEl.value.trim();
    if (!text) return;
    currentData.sections[sectionIdx].tasks.push({ text: text, sub: '', done: false });
    inputEl.value = '';
    renderDashboard();
    scheduleSave();
}

function addSection() {
    const name = prompt('Section name:');
    if (!name || !name.trim()) return;
    currentData.sections.push({ id: 'section-' + Date.now(), title: name.trim(), tasks: [] });
    renderDashboard();
    scheduleSave();
}

function deleteSection(sectionIdx) {
    const section = currentData.sections[sectionIdx];
    const msg = section.tasks.length > 0
        ? `Delete "${section.title}" and its ${section.tasks.length} task(s)?`
        : `Delete empty section "${section.title}"?`;
    if (!confirm(msg)) return;
    currentData.sections.splice(sectionIdx, 1);
    renderDashboard();
    scheduleSave();
    showSaveIndicator('Section deleted', false);
}

// ════════════════════════════════════════════
// Custom Lists
// ════════════════════════════════════════════
function renderLists() {
    if (!currentData.lists) currentData.lists = [];
    const container = document.getElementById('lists-container');
    container.innerHTML = '';
    currentData.lists.forEach((list, li) => {
        const div = document.createElement('div');
        div.className = 'priority-section';
        div.dataset.listIdx = li;

        let itemsHtml = '';
        list.items.forEach((item, ii) => {
            const checked = item.done ? 'checked' : '';
            const checkedClass = item.done ? 'checked' : '';
            itemsHtml += `<li class="${checkedClass}" draggable="true" data-list="${li}" data-item="${ii}">
                <span class="drag-handle" title="Drag to reorder">&#9776;</span>
                <input type="checkbox" ${checked} onchange="toggleListItem(${li},${ii},this)">
                <span class="task-label" onclick="startEditListItem(${li},${ii},this)">${escapeHtml(item.text)}</span>
                <button style="margin-left:auto;background:none;border:none;color:#484f58;cursor:pointer;font-size:1.1rem;" onclick="removeListItem(${li},${ii})" title="Remove">&times;</button>
            </li>`;
        });

        const itemCount = list.items.length;
        const doneCount = list.items.filter(i => i.done).length;
        const badgeText = itemCount > 0 ? `${doneCount}/${itemCount}` : '0 items';
        const badgeClass = doneCount === itemCount && itemCount > 0 ? 'badge done' : 'badge';

        div.innerHTML = `
            <div class="priority-header" onclick="toggleSection(this)">
                <h2 class="editable-title" onclick="event.stopPropagation();startEditListTitle(${li},this)">${escapeHtml(list.title)}</h2>
                <div class="section-header-right">
                    <span class="${badgeClass}">${badgeText}</span>
                    <button class="section-action-btn" onclick="event.stopPropagation();deleteList(${li})" title="Delete list">&#128465;</button>
                </div>
            </div>
            <div class="priority-body">
                <ul class="grocery-list">${itemsHtml}</ul>
                <div class="add-item">
                    <input type="text" placeholder="Add item..." onkeydown="if(event.key==='Enter')addListItem(${li},this)">
                    <button onclick="addListItem(${li},this.previousElementSibling)">Add</button>
                </div>
            </div>`;
        container.appendChild(div);
    });
}

function addList() {
    const name = prompt('List name:');
    if (!name || !name.trim()) return;
    if (!currentData.lists) currentData.lists = [];
    currentData.lists.push({ id: 'list-' + Date.now(), title: name.trim(), items: [] });
    renderLists();
    scheduleSave();
}

function deleteList(listIdx) {
    const list = currentData.lists[listIdx];
    if (!confirm(`Delete list "${list.title}"?`)) return;
    currentData.lists.splice(listIdx, 1);
    renderLists();
    scheduleSave();
    showSaveIndicator('List deleted', false);

function addListItem(listIdx, inputEl) {
    const text = inputEl.value.trim();
    if (!text) return;
    currentData.lists[listIdx].items.push({ text: text, done: false });
    inputEl.value = '';
    renderLists();
    scheduleSave();
}

function toggleListItem(listIdx, itemIdx, el) {
    currentData.lists[listIdx].items[itemIdx].done = el.checked;
    const li = el.closest('li');
    if (el.checked) li.classList.add('checked');
    else li.classList.remove('checked');
    scheduleSave();
}

function removeListItem(listIdx, itemIdx) {
    currentData.lists[listIdx].items.splice(itemIdx, 1);
    renderLists();
    scheduleSave();
}

function startEditListItem(listIdx, itemIdx, el) {
    if (el.querySelector('.task-edit-input')) return;
    const item = currentData.lists[listIdx].items[itemIdx];
    const currentVal = item.text;

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'task-edit-input';
    input.value = currentVal;
    el.textContent = '';
    el.appendChild(input);
    input.focus();
    input.select();

    function finishEdit() {

        renderLists();

    input.addEventListener('blur', finishEdit);
    input.addEventListener('keydown', function(e) {

        if (e.key === 'Escape') { input.value = currentVal; input.blur(); }

    input.addEventListener('click', e => e.stopPropagation());
}

function startEditListTitle(listIdx, h2El) {
    if (h2El.querySelector('.section-title-input')) return;
    const list = currentData.lists[listIdx];
    const currentTitle = list.title;

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'section-title-input';
    input.value = currentTitle;
    h2El.textContent = '';

    input.focus();

    input.addEventListener('blur', finishEdit);

        if (e.key === 'Escape') { input.value = currentTitle; input.blur(); }
    });
    input.addEventListener('click', e => e.stopPropagation());
}

// ════════════════════════════════════════════
// Drag and Drop
// ════════════════════════════════════════════
function arrayMove(arr, from, to) {
    const item = arr.splice(from, 1)[0];
    arr.splice(to, 0, item);
}

let dragFromHandle = false;
document.addEventListener('mousedown', e => {
    dragFromHandle = !!e.target.closest('.drag-handle');
});

function initDragDrop() {
    const sectionsContainer = document.getElementById('sections-container');

    // --- Task drag (within and between sections) ---
    sectionsContainer.querySelectorAll('.task[draggable]').forEach(taskEl => {
        taskEl.addEventListener('dragstart', e => {
            if (!dragFromHandle) { e.preventDefault(); return; }
            e.stopPropagation();
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', JSON.stringify({
                type: 'task',
                section: parseInt(taskEl.dataset.section),
                task: parseInt(taskEl.dataset.task)
            }));
            taskEl.classList.add('dragging');
        });
        taskEl.addEventListener('dragend', () => {
            taskEl.classList.remove('dragging');
            clearPlaceholders();
        });
    });

    // Drop zones: each priority-body
    sectionsContainer.querySelectorAll('.priority-body').forEach(body => {
        body.addEventListener('dragover', e => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            clearPlaceholders();
            const afterEl = getDragAfterElement(body, e.clientY, '.task');
            const placeholder = document.createElement('div');
            placeholder.className = 'drag-placeholder';
            if (afterEl) body.insertBefore(placeholder, afterEl);
            else {
                const addItem = body.querySelector('.add-item');
                if (addItem) body.insertBefore(placeholder, addItem);
                else body.appendChild(placeholder);
            }
        });
        body.addEventListener('dragleave', e => {
            if (!body.contains(e.relatedTarget)) clearPlaceholders();
        });
        body.addEventListener('drop', e => {
            e.preventDefault();
            clearPlaceholders();
            let dragData;
            try { dragData = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }
            if (dragData.type !== 'task') return;

            const targetSection = parseInt(body.closest('.priority-section').dataset.sectionIdx);
            const afterEl = getDragAfterElement(body, e.clientY, '.task');
            let targetIdx = afterEl ? parseInt(afterEl.dataset.task) : currentData.sections[targetSection].tasks.length;

            const srcSection = dragData.section;
            const srcTask = dragData.task;

            if (srcSection === targetSection) {
                if (srcTask < targetIdx) targetIdx--;
                arrayMove(currentData.sections[srcSection].tasks, srcTask, targetIdx);
            } else {
                const task = currentData.sections[srcSection].tasks.splice(srcTask, 1)[0];
                currentData.sections[targetSection].tasks.splice(targetIdx, 0, task);
            }
            renderDashboard();
            scheduleSave();
        });
    });

    // --- Section drag ---
    sectionsContainer.querySelectorAll('.priority-section[draggable]').forEach(sectionEl => {
        sectionEl.addEventListener('dragstart', e => {
            if (!dragFromHandle) { e.preventDefault(); return; }
            if (sectionsContainer.querySelector('.task.dragging')) return;
            e.stopPropagation();
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', JSON.stringify({
                type: 'section',
                section: parseInt(sectionEl.dataset.sectionIdx)
            }));
            setTimeout(() => sectionEl.classList.add('dragging'), 0);
        });
        sectionEl.addEventListener('dragend', () => {
            sectionEl.classList.remove('dragging');
            clearPlaceholders();
        });
    });

    sectionsContainer.addEventListener('dragover', e => {
        const draggingSection = sectionsContainer.querySelector('.priority-section.dragging');
        if (!draggingSection) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        clearPlaceholders();
        const afterEl = getDragAfterElement(sectionsContainer, e.clientY, '.priority-section');
        const placeholder = document.createElement('div');
        placeholder.className = 'drag-placeholder';
        if (afterEl) sectionsContainer.insertBefore(placeholder, afterEl);
        else sectionsContainer.appendChild(placeholder);
    });

    sectionsContainer.addEventListener('drop', e => {
        let dragData;
        try { dragData = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }
        if (dragData.type !== 'section') return;
        e.preventDefault();
        clearPlaceholders();

        const afterEl = getDragAfterElement(sectionsContainer, e.clientY, '.priority-section');
        let targetIdx = afterEl ? parseInt(afterEl.dataset.sectionIdx) : currentData.sections.length;
        const srcIdx = dragData.section;
        if (srcIdx < targetIdx) targetIdx--;
        if (srcIdx !== targetIdx) {
            arrayMove(currentData.sections, srcIdx, targetIdx);
            renderDashboard();
            scheduleSave();
        }
    });

    // --- List item drag ---
    const listsContainer = document.getElementById('lists-container');
    listsContainer.querySelectorAll('li[draggable]').forEach(itemEl => {
        itemEl.addEventListener('dragstart', e => {
            if (!dragFromHandle) { e.preventDefault(); return; }
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', JSON.stringify({
                type: 'listitem',
                list: parseInt(itemEl.dataset.list),
                item: parseInt(itemEl.dataset.item)
            }));
            itemEl.classList.add('dragging');
        });
        itemEl.addEventListener('dragend', () => {
            itemEl.classList.remove('dragging');
            clearPlaceholders();
        });
    });

    listsContainer.querySelectorAll('.grocery-list').forEach(ul => {
        ul.addEventListener('dragover', e => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            clearPlaceholders();
            const afterEl = getDragAfterElement(ul, e.clientY, 'li');
            const placeholder = document.createElement('div');
            placeholder.className = 'drag-placeholder';
            if (afterEl) ul.insertBefore(placeholder, afterEl);
            else ul.appendChild(placeholder);
        });
        ul.addEventListener('dragleave', e => {
            if (!ul.contains(e.relatedTarget)) clearPlaceholders();
        });
        ul.addEventListener('drop', e => {
            e.preventDefault();
            clearPlaceholders();
            let dragData;
            try { dragData = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }
            if (dragData.type !== 'listitem') return;

            const targetList = parseInt(ul.closest('.priority-section').dataset.listIdx);
            const afterEl = getDragAfterElement(ul, e.clientY, 'li');
            let targetIdx = afterEl ? parseInt(afterEl.dataset.item) : currentData.lists[targetList].items.length;

            const srcList = dragData.list;
            const srcItem = dragData.item;

            if (srcList === targetList) {
                if (srcItem < targetIdx) targetIdx--;
                arrayMove(currentData.lists[srcList].items, srcItem, targetIdx);
            } else {
                const item = currentData.lists[srcList].items.splice(srcItem, 1)[0];
                currentData.lists[targetList].items.splice(targetIdx, 0, item);
            }
            renderLists();
            scheduleSave();
        });
    });
}

function getDragAfterElement(container, y, selector) {
    const elements = [...container.querySelectorAll(`${selector}:not(.dragging)`)];
    return elements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) {
            return { offset: offset, element: child };
        }
        return closest;
    }, { offset: Number.NEGATIVE_INFINITY }).element;
}

function clearPlaceholders() {
    document.querySelectorAll('.drag-placeholder').forEach(p => p.remove());
}

function updateDataFromUI() {
    currentData.notes = document.getElementById('admin-notes').value;
}

// ════════════════════════════════════════════
// Progress
// ════════════════════════════════════════════
function updateProgress() {
    let total = 0, done = 0;
    currentData.sections.forEach(s => {
        s.tasks.forEach(t => {
            total++;
            if (t.done) done++;
        });
    });
    document.getElementById('done-count').textContent = done;
    document.getElementById('total-count').textContent = total;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';

    // Update section badges
    document.querySelectorAll('#sections-container .priority-section').forEach(div => {
        const si = parseInt(div.dataset.sectionIdx);
        const section = currentData.sections[si];
        const d = section.tasks.filter(t => t.done).length;
        const badge = div.querySelector('.badge');
        badge.textContent = `${d}/${section.tasks.length}`;
        if (d === section.tasks.length && section.tasks.length > 0) badge.classList.add('done');
        else badge.classList.remove('done');
    });

    updateGroceryBadge();
}

function updateGroceryBadge() {
    const count = currentData ? currentData.grocery.length : 0;
    document.getElementById('grocery-badge').textContent = `${count} item${count !== 1 ? 's' : ''}`;
}

// ════════════════════════════════════════════
// Utilities
// ════════════════════════════════════════════
function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function updateClock() {
    const now = new Date();
    document.getElementById('top-bar-clock').textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const opts = { month: 'short', day: 'numeric', year: 'numeric' };
    document.getElementById('top-bar-date').textContent = now.toLocaleDateString('en-US', opts);
}

// ════════════════════════════════════════════
// Init
// ════════════════════════════════════════════
async function init() {
    const pat = getPat();
    if (!pat) {
        document.getElementById('loading').style.display = 'none';
        showPatModal();
        return;
    }

    try {
        document.getElementById('loading').style.display = 'flex';
        await fetchData();
        renderDashboard();
        document.getElementById('app').style.display = 'block';
    } catch (e) {
        console.error('Init error:', e);
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}

setInterval(updateClock, 1000);
updateClock();
init();
</script>
