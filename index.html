<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evan's Daily Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 24px 0 16px;
            border-bottom: 1px solid #21262d;
            margin-bottom: 24px;
        }
        header h1 {
            color: #e5a00d;
            font-size: 1.6rem;
            font-weight: 700;
        }
        header .date {
            color: #8b949e;
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .header-links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .progress-bar {
            background: #161b22;
            border-radius: 8px;
            height: 8px;
            margin: 16px 0 24px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #e5a00d, #f0c040);
            height: 100%;
            border-radius: 8px;
            transition: width 0.4s ease;
        }
        .progress-label {
            text-align: center;
            font-size: 0.85rem;
            color: #8b949e;
            margin-bottom: 8px;
        }

        /* Priority Sections */
        .priority-section {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .priority-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            cursor: pointer;
            user-select: none;
        }
        .priority-header:hover { background: #1c2129; }
        .priority-header h2 {
            color: #e5a00d;
            font-size: 1.05rem;
            font-weight: 600;
        }
        .priority-header .badge {
            background: #21262d;
            color: #8b949e;
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 12px;
        }
        .priority-header .badge.done {
            background: #1b4332;
            color: #52c41a;
        }
        .priority-body { padding: 0 18px 16px; }

        /* Task Items */
        .task {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #21262d;
        }
        .task:last-child { border-bottom: none; }
        .task input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            min-width: 20px;
            border: 2px solid #30363d;
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            margin-top: 2px;
            position: relative;
        }
        .task input[type="checkbox"]:checked {
            background: #e5a00d;
            border-color: #e5a00d;
        }
        .task input[type="checkbox"]:checked::after {
            content: '\2713';
            position: absolute;
            color: #0d1117;
            font-size: 14px;
            font-weight: bold;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .task.checked .task-text { text-decoration: line-through; color: #484f58; }
        .task-text { flex: 1; font-size: 0.95rem; line-height: 1.5; }
        .task-text .sub { color: #8b949e; font-size: 0.85rem; display: block; }

        /* Grocery Section */
        .grocery-list { list-style: none; padding: 0; }
        .grocery-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            border-bottom: 1px solid #21262d;
        }
        .grocery-list li:last-child { border-bottom: none; }
        .grocery-list li input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px; height: 18px; min-width: 18px;
            border: 2px solid #30363d;
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            position: relative;
        }
        .grocery-list li input[type="checkbox"]:checked {
            background: #52c41a;
            border-color: #52c41a;
        }
        .grocery-list li input[type="checkbox"]:checked::after {
            content: '\2713';
            position: absolute;
            color: #0d1117;
            font-size: 12px;
            font-weight: bold;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .grocery-list li.checked span { text-decoration: line-through; color: #484f58; }
        .add-item {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .add-item input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .add-item input:focus { outline: none; border-color: #e5a00d; }
        .add-item button {
            background: #e5a00d;
            color: #0d1117;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .add-item button:hover { background: #f0c040; }

        /* Notes */
        .notes-area {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            min-height: 80px;
            resize: vertical;
        }
        .notes-area:focus { outline: none; border-color: #e5a00d; }

        /* Time indicator */
        .time-now {
            text-align: center;
            color: #8b949e;
            font-size: 0.8rem;
            padding: 12px 0;
        }
        .nav-link {
            display: inline-block;
            color: #e5a00d;
            text-decoration: none;
            font-size: 0.85rem;
            border: 1px solid #30363d;
            padding: 6px 14px;
            border-radius: 6px;
        }
        .nav-link:hover { background: #161b22; }
        .settings-link {
            color: #8b949e;
            text-decoration: none;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .settings-link:hover { color: #e5a00d; }

        /* Save indicator */
        .save-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1b4332;
            color: #52c41a;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1000;
        }
        .save-indicator.show { opacity: 1; }
        .save-indicator.error { background: #4a1c1c; color: #f85149; }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0d1117ee;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            color: #e5a00d;
            font-size: 1.1rem;
        }

        /* PAT Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0d1117ee;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 28px;
            max-width: 480px;
            width: 90%;
        }
        .modal h2 { color: #e5a00d; margin-bottom: 12px; font-size: 1.2rem; }
        .modal p { color: #8b949e; font-size: 0.9rem; margin-bottom: 16px; line-height: 1.5; }
        .modal input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: monospace;
            margin-bottom: 16px;
        }
        .modal input:focus { outline: none; border-color: #e5a00d; }
        .modal button {
            background: #e5a00d;
            color: #0d1117;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .modal button:hover { background: #f0c040; }
        .modal a { color: #e5a00d; font-size: 0.85rem; }

        /* Responsive */
        @media (max-width: 600px) {
            body { padding: 12px; }
            header h1 { font-size: 1.3rem; }
            .priority-header h2 { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading">Loading dashboard...</div>
    <div class="save-indicator" id="save-indicator">Saved</div>

    <div class="container" id="app" style="display:none;">
        <header>
            <h1>Daily Dashboard</h1>
            <div class="date" id="header-date"></div>
            <div class="time-now" id="clock"></div>
            <div class="header-links">
                <a href="backlog.html" class="nav-link" id="backlog-link">View Full Backlog</a>
                <a class="settings-link" onclick="showPatModal()">&#9881; Settings</a>
            </div>
        </header>

        <div class="progress-label"><span id="done-count">0</span> of <span id="total-count">0</span> tasks complete</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

        <div id="sections-container"></div>

        <!-- Grocery Section -->
        <div class="priority-section" id="grocery-section">
            <div class="priority-header" onclick="toggleSection(this)">
                <h2>Grocery Store Trip</h2>
                <span class="badge" id="grocery-badge">0 items</span>
            </div>
            <div class="priority-body">
                <ul class="grocery-list" id="grocery-list"></ul>
                <div class="add-item">
                    <input type="text" id="grocery-input" placeholder="Add item..." onkeydown="if(event.key==='Enter')addGroceryItem()">
                    <button onclick="addGroceryItem()">Add</button>
                </div>
            </div>
        </div>

        <!-- Notes Section -->
        <div class="priority-section">
            <div class="priority-header" onclick="toggleSection(this)">
                <h2>Notes</h2>
                <span class="badge">memo</span>
            </div>
            <div class="priority-body">
                <textarea class="notes-area" placeholder="Notes -- jot anything down here..." id="admin-notes" oninput="scheduleSave()"></textarea>
            </div>
        </div>
    </div>

<script>
// ════════════════════════════════════════════
// GitHub API Configuration
// ════════════════════════════════════════════
const REPO = 'evanpdixon/personal-daily-tasks';
const FILE_PATH = 'data.json';
const API_BASE = 'https://api.github.com';

let currentData = null;
let currentSha = null;
let saveTimeout = null;
let saving = false;

// ════════════════════════════════════════════
// PAT Management
// ════════════════════════════════════════════
function getPat() {
    return localStorage.getItem('gh-pat');
}

function showPatModal() {
    let existing = document.getElementById('pat-modal');
    if (existing) existing.remove();
    const modal = document.createElement('div');
    modal.id = 'pat-modal';
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal">
            <h2>GitHub Personal Access Token</h2>
            <p>Enter a fine-grained PAT with <strong>Contents: Read & Write</strong> scope for the <code>evanpdixon/personal-daily-tasks</code> repo.</p>
            <p><a href="https://github.com/settings/personal-access-tokens/new" target="_blank">Create a new token on GitHub</a></p>
            <input type="password" id="pat-input" placeholder="github_pat_..." value="${getPat() || ''}">
            <button onclick="savePat()">Save & Load</button>
        </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('pat-input').focus();
}

function savePat() {
    const pat = document.getElementById('pat-input').value.trim();
    if (!pat) return;
    localStorage.setItem('gh-pat', pat);
    document.getElementById('pat-modal').remove();
    init();
}

// ════════════════════════════════════════════
// GitHub API
// ════════════════════════════════════════════
async function fetchData() {
    const pat = getPat();
    const res = await fetch(`${API_BASE}/repos/${REPO}/contents/${FILE_PATH}`, {
        headers: {
            'Authorization': `Bearer ${pat}`,
            'Accept': 'application/vnd.github.v3+json'
        }
    });
    if (!res.ok) {
        if (res.status === 401 || res.status === 403) {
            showPatModal();
            throw new Error('Invalid token');
        }
        throw new Error(`GitHub API error: ${res.status}`);
    }
    const json = await res.json();
    currentSha = json.sha;
    const content = atob(json.content.replace(/\n/g, ''));
    // Decode as UTF-8
    const bytes = new Uint8Array(content.length);
    for (let i = 0; i < content.length; i++) bytes[i] = content.charCodeAt(i);
    const decoded = new TextDecoder().decode(bytes);
    currentData = JSON.parse(decoded);
    return currentData;
}

async function saveData() {
    if (saving) return;
    saving = true;
    const pat = getPat();
    const content = JSON.stringify(currentData, null, 2);
    // Encode as base64 (UTF-8 safe)
    const encoded = btoa(unescape(encodeURIComponent(content)));

    try {
        const res = await fetch(`${API_BASE}/repos/${REPO}/contents/${FILE_PATH}`, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${pat}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: `Dashboard update ${new Date().toISOString()}`,
                content: encoded,
                sha: currentSha
            })
        });

        if (res.status === 409) {
            // SHA conflict -- re-fetch and retry
            await fetchData();
            saving = false;
            await saveData();
            return;
        }

        if (!res.ok) {
            throw new Error(`Save failed: ${res.status}`);
        }

        const result = await res.json();
        currentSha = result.content.sha;
        showSaveIndicator('Saved', false);
    } catch (e) {
        console.error('Save error:', e);
        showSaveIndicator('Save failed', true);
    } finally {
        saving = false;
    }
}

function scheduleSave() {
    if (saveTimeout) clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
        updateDataFromUI();
        saveData();
    }, 500);
}

function showSaveIndicator(text, isError) {
    const el = document.getElementById('save-indicator');
    el.textContent = text;
    el.classList.toggle('error', isError);
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1500);
}

// ════════════════════════════════════════════
// Rendering
// ════════════════════════════════════════════
function renderDashboard() {
    const data = currentData;

    // Date
    const d = new Date(data.date + 'T12:00:00');
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('header-date').textContent = d.toLocaleDateString('en-US', opts);

    // Backlog link
    const backlogCount = data.backlog ? data.backlog.length : 0;
    document.getElementById('backlog-link').textContent = `View Full Backlog (${backlogCount} tasks)`;

    // Sections
    const container = document.getElementById('sections-container');
    container.innerHTML = '';
    data.sections.forEach((section, si) => {
        const div = document.createElement('div');
        div.className = 'priority-section';
        div.dataset.sectionIdx = si;

        let tasksHtml = '';
        section.tasks.forEach((task, ti) => {
            const checked = task.done ? 'checked' : '';
            const checkedClass = task.done ? 'checked' : '';
            const subHtml = task.sub ? `<span class="sub">${escapeHtml(task.sub)}</span>` : '';
            const deleteBtn = task.done ? `<button onclick="deleteTask(${si}, ${ti})" title="Delete task" style="background:none;border:1px solid #4a1c1c;color:#f85149;cursor:pointer;font-size:0.7rem;padding:3px 8px;border-radius:4px;white-space:nowrap;">&times; Delete</button>` : '';
            tasksHtml += `
                <div class="task ${checkedClass}">
                    <input type="checkbox" ${checked} onchange="handleCheck(${si}, ${ti}, this)">
                    <div class="task-text">${escapeHtml(task.text)}${subHtml}</div>
                    ${deleteBtn}
                    <button onclick="moveToBacklog(${si}, ${ti})" title="Move to backlog" style="background:none;border:1px solid #30363d;color:#8b949e;cursor:pointer;font-size:0.7rem;padding:3px 8px;border-radius:4px;white-space:nowrap;">&#8592; Backlog</button>
                </div>`;
        });

        const doneCount = section.tasks.filter(t => t.done).length;
        const totalCount = section.tasks.length;
        const badgeClass = doneCount === totalCount && totalCount > 0 ? 'badge done' : 'badge';

        div.innerHTML = `
            <div class="priority-header" onclick="toggleSection(this)">
                <h2>${escapeHtml(section.title)}</h2>
                <span class="${badgeClass}">${doneCount}/${totalCount}</span>
            </div>
            <div class="priority-body">${tasksHtml}</div>`;
        container.appendChild(div);
    });

    // Grocery
    renderGrocery();

    // Notes
    document.getElementById('admin-notes').value = data.notes || '';

    updateProgress();
}

function renderGrocery() {
    const list = document.getElementById('grocery-list');
    list.innerHTML = '';
    currentData.grocery.forEach((item, i) => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('checked');
        li.innerHTML = `<input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleGrocery(${i}, this)"><span>${escapeHtml(item.text)}</span><button style="margin-left:auto;background:none;border:none;color:#484f58;cursor:pointer;font-size:1.1rem;" onclick="removeGrocery(${i})" title="Remove">&times;</button>`;
        list.appendChild(li);
    });
    updateGroceryBadge();
}

// ════════════════════════════════════════════
// Interactions
// ════════════════════════════════════════════
function handleCheck(sectionIdx, taskIdx, el) {
    currentData.sections[sectionIdx].tasks[taskIdx].done = el.checked;
    const task = el.closest('.task');
    if (el.checked) task.classList.add('checked');
    else task.classList.remove('checked');
    updateProgress();
    scheduleSave();
}

function toggleGrocery(idx, el) {
    currentData.grocery[idx].done = el.checked;
    const li = el.closest('li');
    if (el.checked) li.classList.add('checked');
    else li.classList.remove('checked');
    scheduleSave();
}

function removeGrocery(idx) {
    currentData.grocery.splice(idx, 1);
    renderGrocery();
    scheduleSave();
}

function addGroceryItem() {
    const input = document.getElementById('grocery-input');
    const text = input.value.trim();
    if (!text) return;
    currentData.grocery.push({ text: text, done: false });
    input.value = '';
    renderGrocery();
    scheduleSave();
}

function deleteTask(sectionIdx, taskIdx) {
    const section = currentData.sections[sectionIdx];
    const task = section.tasks[taskIdx];
    if (!task) return;
    if (!confirm(`Delete "${task.text}"?`)) return;

    section.tasks.splice(taskIdx, 1);
    if (section.tasks.length === 0) {
        currentData.sections.splice(sectionIdx, 1);
    }

    renderDashboard();
    scheduleSave();
    showSaveIndicator('Deleted', false);
}

function moveToBacklog(sectionIdx, taskIdx) {
    const section = currentData.sections[sectionIdx];
    const task = section.tasks[taskIdx];
    if (!task) return;

    // Add to backlog
    if (!currentData.backlog) currentData.backlog = [];
    currentData.backlog.unshift({
        id: 'bt-' + Date.now(),
        title: task.text,
        detail: task.sub || '',
        priority: 'medium',
        category: section.title,
        source: 'daily'
    });

    // Remove from daily
    section.tasks.splice(taskIdx, 1);

    // Remove empty sections
    if (section.tasks.length === 0) {
        currentData.sections.splice(sectionIdx, 1);
    }

    renderDashboard();
    scheduleSave();
    showSaveIndicator('Moved to backlog', false);
}

function toggleSection(header) {
    const body = header.nextElementSibling;
    body.style.display = body.style.display === 'none' ? 'block' : 'none';
}

function updateDataFromUI() {
    currentData.notes = document.getElementById('admin-notes').value;
}

// ════════════════════════════════════════════
// Progress
// ════════════════════════════════════════════
function updateProgress() {
    let total = 0, done = 0;
    currentData.sections.forEach(s => {
        s.tasks.forEach(t => {
            total++;
            if (t.done) done++;
        });
    });
    document.getElementById('done-count').textContent = done;
    document.getElementById('total-count').textContent = total;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';

    // Update section badges
    document.querySelectorAll('#sections-container .priority-section').forEach(div => {
        const si = parseInt(div.dataset.sectionIdx);
        const section = currentData.sections[si];
        const d = section.tasks.filter(t => t.done).length;
        const badge = div.querySelector('.badge');
        badge.textContent = `${d}/${section.tasks.length}`;
        if (d === section.tasks.length && section.tasks.length > 0) badge.classList.add('done');
        else badge.classList.remove('done');
    });

    updateGroceryBadge();
}

function updateGroceryBadge() {
    const count = currentData ? currentData.grocery.length : 0;
    document.getElementById('grocery-badge').textContent = `${count} item${count !== 1 ? 's' : ''}`;
}

// ════════════════════════════════════════════
// Utilities
// ════════════════════════════════════════════
function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' });
}

// ════════════════════════════════════════════
// Init
// ════════════════════════════════════════════
async function init() {
    const pat = getPat();
    if (!pat) {
        document.getElementById('loading').style.display = 'none';
        showPatModal();
        return;
    }

    try {
        document.getElementById('loading').style.display = 'flex';
        await fetchData();
        renderDashboard();
        document.getElementById('app').style.display = 'block';
    } catch (e) {
        console.error('Init error:', e);
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}

setInterval(updateClock, 1000);
updateClock();
init();
</script>
</body>
</html>
