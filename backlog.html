<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RME Master Backlog -- All Tasks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 24px 0 16px;
            border-bottom: 1px solid #21262d;
            margin-bottom: 20px;
        }
        header h1 { color: #e5a00d; font-size: 1.6rem; font-weight: 700; }
        header .sub { color: #8b949e; font-size: 0.9rem; margin-top: 4px; }
        .header-links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .nav-link {
            display: inline-block;
            color: #e5a00d;
            text-decoration: none;
            font-size: 0.85rem;
            border: 1px solid #30363d;
            padding: 6px 14px;
            border-radius: 6px;
        }
        .nav-link:hover { background: #161b22; }
        .settings-link {
            color: #8b949e;
            text-decoration: none;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .settings-link:hover { color: #e5a00d; }

        /* Controls bar */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        .controls input[type="text"] {
            flex: 1;
            min-width: 200px;
            background: #161b22;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .controls input:focus { outline: none; border-color: #e5a00d; }
        .controls select {
            background: #161b22;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .tab {
            background: #161b22;
            border: 1px solid #21262d;
            color: #8b949e;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            user-select: none;
        }
        .tab:hover { border-color: #e5a00d; color: #c9d1d9; }
        .tab.active { background: #e5a00d; color: #0d1117; border-color: #e5a00d; font-weight: 600; }
        .tab .count {
            margin-left: 4px;
            font-size: 0.75rem;
            opacity: 0.7;
        }

        /* Task cards */
        .task-card {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .task-card:hover { border-color: #30363d; }
        .task-card input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px; height: 18px; min-width: 18px;
            border: 2px solid #30363d;
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            margin-top: 2px;
            position: relative;
        }
        .task-card input[type="checkbox"]:checked {
            background: #e5a00d;
            border-color: #e5a00d;
        }
        .task-card input[type="checkbox"]:checked::after {
            content: '\2713';
            position: absolute;
            color: #0d1117;
            font-size: 12px;
            font-weight: bold;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .task-card.checked .tc-title { text-decoration: line-through; color: #484f58; }
        .tc-content { flex: 1; }
        .tc-title { font-size: 0.95rem; line-height: 1.4; }
        .tc-detail { color: #8b949e; font-size: 0.82rem; margin-top: 3px; }
        .tc-meta { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
        .tc-tag {
            font-size: 0.7rem;
            padding: 1px 7px;
            border-radius: 10px;
            background: #21262d;
            color: #8b949e;
        }
        .tc-tag.high { background: #4a1c1c; color: #f85149; }
        .tc-tag.medium { background: #3d2e00; color: #e5a00d; }
        .tc-tag.low { background: #0d2818; color: #3fb950; }

        .summary-bar {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: #8b949e;
        }
        .summary-bar span { color: #e5a00d; font-weight: 600; }

        /* Save indicator */
        .save-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1b4332;
            color: #52c41a;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1000;
        }
        .save-indicator.show { opacity: 1; }
        .save-indicator.error { background: #4a1c1c; color: #f85149; }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0d1117ee;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            color: #e5a00d;
            font-size: 1.1rem;
        }

        /* PAT Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0d1117ee;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 28px;
            max-width: 480px;
            width: 90%;
        }
        .modal h2 { color: #e5a00d; margin-bottom: 12px; font-size: 1.2rem; }
        .modal p { color: #8b949e; font-size: 0.9rem; margin-bottom: 16px; line-height: 1.5; }
        .modal input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: monospace;
            margin-bottom: 16px;
        }
        .modal input:focus { outline: none; border-color: #e5a00d; }
        .modal button {
            background: #e5a00d;
            color: #0d1117;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .modal button:hover { background: #f0c040; }
        .modal a { color: #e5a00d; font-size: 0.85rem; }

        .no-results {
            text-align: center;
            color: #484f58;
            padding: 40px 20px;
            font-size: 0.95rem;
        }

        @media (max-width: 600px) {
            body { padding: 12px; }
            header h1 { font-size: 1.3rem; }
            .controls { flex-direction: column; }
            .controls input, .controls select { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading">Loading backlog...</div>
    <div class="save-indicator" id="save-indicator">Saved</div>

    <div class="container" id="app" style="display:none;">
        <header>
            <h1>RME Master Backlog</h1>
            <div class="sub" id="task-count-sub">All Tasks</div>
            <div class="header-links">
                <a href="index.html" class="nav-link">Back to Daily Dashboard</a>
                <a class="settings-link" onclick="showPatModal()">&#9881; Settings</a>
            </div>
        </header>

        <div class="tabs" id="tabs">
            <div class="tab active" data-source="all" onclick="setSource(this)">All<span class="count" id="count-all"></span></div>
            <div class="tab" data-source="roadmap" onclick="setSource(this)">Site Roadmap<span class="count" id="count-roadmap"></span></div>
            <div class="tab" data-source="dashboard" onclick="setSource(this)">Dashboard Todos<span class="count" id="count-dashboard"></span></div>
        </div>

        <div class="controls">
            <input type="text" id="search" placeholder="Search tasks..." oninput="render()">
            <select id="priority-filter" onchange="render()">
                <option value="all">All Priorities</option>
                <option value="high">High Only</option>
                <option value="medium">Medium Only</option>
                <option value="low">Low Only</option>
            </select>
            <select id="category-filter" onchange="render()">
                <option value="all">All Categories</option>
            </select>
        </div>

        <div class="summary-bar" id="summary-bar"></div>
        <div id="task-list"></div>
    </div>

<script>
// ════════════════════════════════════════════
// GitHub API Configuration
// ════════════════════════════════════════════
const REPO = 'evanpdixon/personal-daily-tasks';
const FILE_PATH = 'data.json';
const API_BASE = 'https://api.github.com';

let currentData = null;
let currentSha = null;
let saveTimeout = null;
let saving = false;
let currentSource = 'all';

// ════════════════════════════════════════════
// PAT Management
// ════════════════════════════════════════════
function getPat() {
    return localStorage.getItem('gh-pat');
}

function showPatModal() {
    let existing = document.getElementById('pat-modal');
    if (existing) existing.remove();
    const modal = document.createElement('div');
    modal.id = 'pat-modal';
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal">
            <h2>GitHub Personal Access Token</h2>
            <p>Enter a fine-grained PAT with <strong>Contents: Read & Write</strong> scope for the <code>evanpdixon/personal-daily-tasks</code> repo.</p>
            <p><a href="https://github.com/settings/personal-access-tokens/new" target="_blank">Create a new token on GitHub</a></p>
            <input type="password" id="pat-input" placeholder="github_pat_..." value="${getPat() || ''}">
            <button onclick="savePat()">Save & Load</button>
        </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('pat-input').focus();
}

function savePat() {
    const pat = document.getElementById('pat-input').value.trim();
    if (!pat) return;
    localStorage.setItem('gh-pat', pat);
    document.getElementById('pat-modal').remove();
    init();
}

// ════════════════════════════════════════════
// GitHub API
// ════════════════════════════════════════════
async function fetchData() {
    const pat = getPat();
    const res = await fetch(`${API_BASE}/repos/${REPO}/contents/${FILE_PATH}`, {
        headers: {
            'Authorization': `Bearer ${pat}`,
            'Accept': 'application/vnd.github.v3+json'
        }
    });
    if (!res.ok) {
        if (res.status === 401 || res.status === 403) {
            showPatModal();
            throw new Error('Invalid token');
        }
        throw new Error(`GitHub API error: ${res.status}`);
    }
    const json = await res.json();
    currentSha = json.sha;
    const content = atob(json.content.replace(/\n/g, ''));
    const bytes = new Uint8Array(content.length);
    for (let i = 0; i < content.length; i++) bytes[i] = content.charCodeAt(i);
    const decoded = new TextDecoder().decode(bytes);
    currentData = JSON.parse(decoded);
    return currentData;
}

async function saveData() {
    if (saving) return;
    saving = true;
    const pat = getPat();
    const content = JSON.stringify(currentData, null, 2);
    const encoded = btoa(unescape(encodeURIComponent(content)));

    try {
        const res = await fetch(`${API_BASE}/repos/${REPO}/contents/${FILE_PATH}`, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${pat}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: `Backlog update ${new Date().toISOString()}`,
                content: encoded,
                sha: currentSha
            })
        });

        if (res.status === 409) {
            await fetchData();
            saving = false;
            await saveData();
            return;
        }

        if (!res.ok) throw new Error(`Save failed: ${res.status}`);

        const result = await res.json();
        currentSha = result.content.sha;
        showSaveIndicator('Saved', false);
    } catch (e) {
        console.error('Save error:', e);
        showSaveIndicator('Save failed', true);
    } finally {
        saving = false;
    }
}

function scheduleSave() {
    if (saveTimeout) clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => saveData(), 500);
}

function showSaveIndicator(text, isError) {
    const el = document.getElementById('save-indicator');
    el.textContent = text;
    el.classList.toggle('error', isError);
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1500);
}

// ════════════════════════════════════════════
// Filtering & Rendering
// ════════════════════════════════════════════
function getFilteredTasks() {
    const backlog = currentData.backlog || [];
    const search = document.getElementById('search').value.toLowerCase();
    const priority = document.getElementById('priority-filter').value;
    const category = document.getElementById('category-filter').value;

    return backlog.filter(t => {
        if (currentSource !== 'all' && t.source !== currentSource) return false;
        if (priority !== 'all' && t.priority !== priority) return false;
        if (category !== 'all') {
            const cat = t.phase || t.category || 'Uncategorized';
            if (cat !== category) return false;
        }
        if (search) {
            const haystack = (t.title + ' ' + (t.detail || '') + ' ' + (t.tags || []).join(' ')).toLowerCase();
            if (!haystack.includes(search)) return false;
        }
        return true;
    });
}

function render() {
    const tasks = getFilteredTasks();
    const list = document.getElementById('task-list');

    if (tasks.length === 0) {
        list.innerHTML = '<div class="no-results">No tasks match your filters.</div>';
    } else {
        list.innerHTML = tasks.map((t, i) => {
            const realIdx = currentData.backlog.indexOf(t);
            const checkedClass = t.done ? 'checked' : '';
            const checkedAttr = t.done ? 'checked' : '';
            const priorityClass = t.priority || 'medium';
            const detail = t.detail ? `<div class="tc-detail">${escapeHtml(t.detail)}</div>` : '';
            const tags = [];
            tags.push(`<span class="tc-tag ${priorityClass}">${priorityClass}</span>`);
            if (t.phase) tags.push(`<span class="tc-tag">${escapeHtml(t.phase)}</span>`);
            if (t.category) tags.push(`<span class="tc-tag">${escapeHtml(t.category)}</span>`);
            if (t.effort) tags.push(`<span class="tc-tag">${escapeHtml(t.effort)}</span>`);
            if (t.source) tags.push(`<span class="tc-tag">${t.source}</span>`);
            (t.tags || []).forEach(tag => tags.push(`<span class="tc-tag">${escapeHtml(tag)}</span>`));

            return `
                <div class="task-card ${checkedClass}" data-idx="${realIdx}">
                    <input type="checkbox" ${checkedAttr} onchange="toggleBacklogTask(${realIdx}, this)">
                    <div class="tc-content">
                        <div class="tc-title">${escapeHtml(t.title)}</div>
                        ${detail}
                        <div class="tc-meta">${tags.join('')}</div>
                    </div>
                </div>`;
        }).join('');
    }

    // Summary bar
    const allBacklog = currentData.backlog || [];
    const sourceTasks = currentSource === 'all' ? allBacklog : allBacklog.filter(t => t.source === currentSource);
    const high = sourceTasks.filter(t => t.priority === 'high').length;
    const med = sourceTasks.filter(t => t.priority === 'medium').length;
    const low = sourceTasks.filter(t => t.priority === 'low').length;
    const done = sourceTasks.filter(t => t.done).length;
    document.getElementById('summary-bar').innerHTML = `
        Showing <span>${tasks.length}</span> of ${sourceTasks.length} |
        High: <span>${high}</span> | Med: <span>${med}</span> | Low: <span>${low}</span> |
        Done: <span>${done}</span>`;

    document.getElementById('task-count-sub').textContent = `${allBacklog.length} total tasks`;
}

function setSource(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentSource = tab.dataset.source;
    render();
}

function toggleBacklogTask(idx, el) {
    currentData.backlog[idx].done = el.checked;
    const card = el.closest('.task-card');
    if (el.checked) card.classList.add('checked');
    else card.classList.remove('checked');
    scheduleSave();
}

function populateCategoryFilter() {
    const cats = new Set();
    (currentData.backlog || []).forEach(t => {
        const cat = t.phase || t.category || null;
        if (cat) cats.add(cat);
    });
    const sel = document.getElementById('category-filter');
    sel.innerHTML = '<option value="all">All Categories</option>';
    [...cats].sort().forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        sel.appendChild(opt);
    });
}

function updateTabCounts() {
    const backlog = currentData.backlog || [];
    document.getElementById('count-all').textContent = ` (${backlog.length})`;
    document.getElementById('count-roadmap').textContent = ` (${backlog.filter(t => t.source === 'roadmap').length})`;
    document.getElementById('count-dashboard').textContent = ` (${backlog.filter(t => t.source === 'dashboard').length})`;
}

// ════════════════════════════════════════════
// Utilities
// ════════════════════════════════════════════
function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ════════════════════════════════════════════
// Init
// ════════════════════════════════════════════
async function init() {
    const pat = getPat();
    if (!pat) {
        document.getElementById('loading').style.display = 'none';
        showPatModal();
        return;
    }

    try {
        document.getElementById('loading').style.display = 'flex';
        await fetchData();
        populateCategoryFilter();
        updateTabCounts();
        render();
        document.getElementById('app').style.display = 'block';
    } catch (e) {
        console.error('Init error:', e);
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}

init();
</script>
</body>
</html>
